<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" role="img" aria-labelledby="title">
  <title id="title">EnviBayes logo</title>
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95d5b2"/>
      <stop offset="100%" style="stop-color:#52b788"/>
    </linearGradient>
  </defs>
  <!-- Bell curve + small leaf (Bayes + environment) -->
  <path d="M6 38 Q 29 6 52 38" fill="none" stroke="url(#markGrad)" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M 44 20 Q 48 14 54 18 Q 52 24 46 24 Q 42 22 44 20 Z" fill="#74c69d"/>
  <ellipse cx="18" cy="16" rx="4" ry="6" fill="none" stroke="#b7e4c7" stroke-width="1.8" transform="rotate(-22 18 16)"/>
  <!-- Wordmark (light on dark green navbar) -->
  <text x="66" y="32" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#e8f5e9">Envi<tspan fill="#b7e4c7">Bayes</tspan></text>
</svg>
